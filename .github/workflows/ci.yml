name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Pull SQL Server image
        run: docker pull mcr.microsoft.com/mssql/server:2022-latest

      - name: Restore
        run: dotnet restore Itenium.EfTesting.slnx

      - name: Build
        run: dotnet build Itenium.EfTesting.slnx --no-restore

      - name: Test
        run: dotnet test Itenium.EfTesting.slnx --no-build --verbosity normal
